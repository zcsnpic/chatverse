<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatVerse - 虚拟聊天空间</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app" class="app-container">
        <!-- 页面容器 -->
        <div class="phone-frame" id="phone-frame">
            <!-- 首页 -->
            <div id="page-home" class="page page-home active">
                <div class="page-header gradient-bg">
                    <div class="header-content">
                        <div class="header-left">
                            <h1 class="app-title">ChatVerse</h1>
                            <p class="app-subtitle">虚拟聊天空间</p>
                        </div>
                        <button class="settings-btn" onclick="App.navigateTo('settings')">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="3"></circle>
                                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                            </svg>
                        </button>
                    </div>
                    <div class="search-box">
                        <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.35-4.35"></path>
                        </svg>
                        <input type="text" id="search-input" placeholder="搜索聊天对象..." oninput="App.filterChatObjects(this.value)">
                    </div>
                </div>
                
                <div class="page-content scrollbar-hide">
                    <p class="section-label">最近聊天</p>
                    <div id="chat-object-list" class="chat-list">
                        <!-- 动态生成 -->
                    </div>
                    <div id="empty-state" class="empty-state" style="display: none;">
                        <div class="empty-icon">💬</div>
                        <p>还没有聊天对象</p>
                        <button class="create-first-btn" onclick="App.navigateTo('create')">
                            创建你的第一个角色
                        </button>
                    </div>
                </div>
                
                <div class="page-footer">
                    <button class="nav-btn active" onclick="App.navigateTo('home')">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"></path>
                        </svg>
                        <span>消息</span>
                    </button>
                    <button class="nav-btn" onclick="App.navigateTo('create')">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                        <span>创建</span>
                    </button>
                    <button class="nav-btn" onclick="App.navigateTo('settings')">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="3"></circle>
                            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                        </svg>
                        <span>设置</span>
                    </button>
                </div>
            </div>
            
            <!-- 聊天页 -->
            <div id="page-chat" class="page page-chat hidden">
                <div class="chat-header-fixed">
                    <button class="back-btn" onclick="App.navigateTo('home')">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M15 18l-6-6 6-6"></path>
                        </svg>
                    </button>
                    <div class="chat-info">
                        <div id="chat-avatar" class="avatar-small"></div>
                        <div class="chat-meta">
                            <h2 id="chat-name">聊天对象</h2>
                            <p id="chat-scene" class="scene-label">场景: 咖啡馆</p>
                        </div>
                    </div>
                    <button class="menu-btn" onclick="App.toggleMemoryDrawer()">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="3" y1="6" x2="21" y2="6"></line>
                            <line x1="3" y1="12" x2="21" y2="12"></line>
                            <line x1="3" y1="18" x2="21" y2="18"></line>
                        </svg>
                    </button>
                </div>
                
                <div id="message-container" class="message-container scrollbar-hide">
                    <!-- 动态生成消息 -->
                </div>
                
                <!-- 记忆管理抽屉 -->
                <div id="memory-drawer" class="memory-drawer hidden">
                    <div class="drawer-overlay" onclick="App.toggleMemoryDrawer()"></div>
                    <div class="drawer-content">
                        <div class="drawer-header gradient-bg">
                            <h3>关键记忆</h3>
                            <button class="close-btn" onclick="App.toggleMemoryDrawer()">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <line x1="18" y1="6" x2="6" y2="18"></line>
                                    <line x1="6" y1="6" x2="18" y2="18"></line>
                                </svg>
                            </button>
                        </div>
                        <div class="drawer-body scrollbar-hide">
                            <div id="memory-list" class="memory-list">
                                <!-- 动态生成 -->
                            </div>
                            <button class="add-memory-btn" onclick="App.showAddMemoryModal()">
                                + 添加记忆
                            </button>
                            <button class="reset-context-btn" onclick="App.resetContext()">
                                🔄 重置上下文
                            </button>
                        </div>
                    </div>
                </div>
                
                <div class="input-area">
                    <input type="text" id="message-input" placeholder="输入消息..." onkeypress="App.handleKeyPress(event)">
                    <button class="send-btn" onclick="App.sendMessage()">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
            </div>
            
            <!-- 创建对象页 -->
            <div id="page-create" class="page page-create hidden">
                <div class="page-header gradient-bg">
                    <div class="page-nav-header">
                        <button class="back-btn" onclick="App.navigateTo('home')">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M15 18l-6-6 6-6"></path>
                            </svg>
                        </button>
                        <h2>创建聊天对象</h2>
                    </div>
                </div>
                
                <div class="page-content scrollbar-hide create-content">
                    <div class="avatar-upload" onclick="App.triggerAvatarUpload()">
                        <div id="avatar-preview" class="avatar-preview">
                            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="12" y1="5" x2="12" y2="19"></line>
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                            </svg>
                        </div>
                        <button class="avatar-upload-btn">选择头像</button>
                        <input type="file" id="avatar-input" accept="image/*" style="display: none;" onchange="App.handleAvatarUpload(event)">
                    </div>
                    
                    <form id="create-form" class="create-form">
                        <div class="form-group">
                            <label>名称</label>
                            <input type="text" id="object-name" placeholder="给你的角色起个名字" required>
                        </div>
                        
                        <div class="form-group">
                            <label>身份</label>
                            <textarea id="object-identity" placeholder="描述这个角色的身份，比如：一位温柔的咖啡店老板" rows="3"></textarea>
                        </div>
                        
                        <div class="form-group">
                            <label>角色设定</label>
                            <textarea id="object-role" placeholder="详细描述角色的性格、说话方式、行为习惯等" rows="4"></textarea>
                        </div>
                        
                        <div class="form-group">
                            <div class="memory-header">
                                <label>关键记忆</label>
                                <button type="button" class="add-memory-link" onclick="App.addMemoryField()">+ 添加</button>
                            </div>
                            <div id="memory-fields" class="memory-fields">
                                <div class="memory-field-item">
                                    <input type="text" placeholder="记忆内容" class="memory-input">
                                    <select class="memory-importance">
                                        <option value="1">⭐</option>
                                        <option value="2">⭐⭐</option>
                                        <option value="3">⭐⭐⭐</option>
                                        <option value="4">⭐⭐⭐⭐</option>
                                        <option value="5" selected>⭐⭐⭐⭐⭐</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
                
                <div class="page-footer">
                    <button class="create-submit-btn gradient-bg" onclick="App.createChatObject()">
                        创建角色
                    </button>
                </div>
            </div>
            
            <!-- 设置页 -->
            <div id="page-settings" class="page page-settings hidden">
                <div class="page-header gradient-bg">
                    <div class="page-nav-header">
                        <button class="back-btn" onclick="App.navigateTo('home')">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M15 18l-6-6 6-6"></path>
                            </svg>
                        </button>
                        <h2>设置</h2>
                    </div>
                </div>
                
                <div class="page-content scrollbar-hide">
                    <div class="settings-section">
                        <h3 class="settings-title">应用设置</h3>
                        <div class="settings-card">
                            <div class="settings-item" onclick="App.showThemeSelector()">
                                <div class="settings-item-icon theme-icon"></div>
                                <span>主题</span>
                                <div class="settings-item-right">
                                    <span id="current-theme">Midnight Galaxy</span>
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <polyline points="9 18 15 12 9 6"></polyline>
                                    </svg>
                                </div>
                            </div>
                            <div class="settings-item">
                                <div class="settings-item-icon font-icon"></div>
                                <span>字体大小</span>
                                <div class="settings-item-right">
                                    <span>标准</span>
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <polyline points="9 18 15 12 9 6"></polyline>
                                    </svg>
                                </div>
                            </div>
                            <div class="settings-item">
                                <div class="settings-item-icon notification-icon"></div>
                                <span>消息通知</span>
                                <div class="toggle-switch">
                                    <input type="checkbox" id="notification-toggle" checked>
                                    <label for="notification-toggle"></label>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="settings-section">
                        <h3 class="settings-title">存储管理</h3>
                        <div class="settings-card">
                            <div class="storage-info">
                                <div class="storage-label">
                                    <span>已使用空间</span>
                                    <span id="storage-usage">248 MB / 2 GB</span>
                                </div>
                                <div class="storage-bar">
                                    <div id="storage-bar-fill" class="storage-bar-fill"></div>
                                </div>
                            </div>
                            <div class="settings-item" onclick="App.exportData()">
                                <div class="settings-item-icon export-icon"></div>
                                <span>导出数据</span>
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="9 18 15 12 9 6"></polyline>
                                </svg>
                            </div>
                            <div class="settings-item" onclick="App.importData()">
                                <div class="settings-item-icon import-icon"></div>
                                <span>导入数据</span>
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="9 18 15 12 9 6"></polyline>
                                </svg>
                            </div>
                            <div class="settings-item danger" onclick="App.clearAllData()">
                                <div class="settings-item-icon delete-icon"></div>
                                <span>清除所有数据</span>
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="9 18 15 12 9 6"></polyline>
                                </svg>
                            </div>
                        </div>
                    </div>
                    
                    <div class="settings-section">
                        <h3 class="settings-title">AI 设置</h3>
                        <div class="settings-card">
                            <div class="settings-item" onclick="App.showModelSelector()">
                                <div class="settings-item-icon model-icon"></div>
                                <span>AI 模型</span>
                                <div class="settings-item-right">
                                    <span id="current-model">DeepSeek</span>
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <polyline points="9 18 15 12 9 6"></polyline>
                                    </svg>
                                </div>
                            </div>
                            <div class="settings-item">
                                <div class="settings-item-icon delay-icon"></div>
                                <span>消息延迟</span>
                                <div class="settings-item-right">
                                    <span id="message-delay">1-2秒</span>
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <polyline points="9 18 15 12 9 6"></polyline>
                                    </svg>
                                </div>
                            </div>
                            <div class="settings-item" onclick="App.showAPIConfig()">
                                <div class="settings-item-icon api-icon"></div>
                                <span>API 设置</span>
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="9 18 15 12 9 6"></polyline>
                                </svg>
                            </div>
                        </div>
                    </div>
                    
                    <div class="settings-section">
                        <div class="settings-card">
                            <div class="settings-item" onclick="App.showAbout()">
                                <span>关于 ChatVerse</span>
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="9 18 15 12 9 6"></polyline>
                                </svg>
                            </div>
                        </div>
                        <p class="version-info">ChatVerse v1.0.0</p>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 模态框 -->
        <div id="modal-overlay" class="modal-overlay hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 id="modal-title">提示</h3>
                    <button class="modal-close" onclick="App.closeModal()">×</button>
                </div>
                <div id="modal-body" class="modal-body">
                    <!-- 动态内容 -->
                </div>
            </div>
        </div>
        
        <!-- Toast 提示 -->
        <div id="toast" class="toast hidden">
            <p id="toast-message">提示消息</p>
        </div>
    </div>
    
    <script src="js/config/models.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/ai-service.js"></script>
    <script src="js/chat-manager.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
